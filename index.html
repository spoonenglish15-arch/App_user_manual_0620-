*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif;background:#F0E6DA;margin:0;padding:0;color:#4A3F35}
.container{max-width:480px;margin:0 auto;padding:16px 16px 32px}
.logo{display:block;width:216px;height:auto;margin:8px auto 16px}
h1{font-size:2.55rem;margin:0 0 20px;padding:0 4px;font-weight:300;text-align:center;text-transform:uppercase;letter-spacing:.04em;color:#5C4A3A;line-height:1.2}
.accordion-item{background:#FAF5EF;margin-bottom:6px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(92,74,58,.08);border:1px solid #E8DDD0}
.accordion-header{width:100%;padding:9px 34px 9px 12px;border:none;background:#FAF5EF;text-align:left;font-size:.875rem;font-weight:600;cursor:pointer;position:relative;line-height:1.3;color:#4A3F35;-webkit-tap-highlight-color:transparent}
.accordion-header::after{content:"";position:absolute;right:14px;top:50%;width:7px;height:7px;border-right:2px solid #A68B6B;border-bottom:2px solid #A68B6B;transform:translateY(-70%) rotate(45deg);transition:transform .25s ease}
.accordion-item.open .accordion-header{background:#F5EDE4}
.accordion-item.open .accordion-header::after{transform:translateY(-30%) rotate(-135deg)}
.accordion-header .num{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;margin-right:8px;background:#C4956A;color:#FFFBF7;border-radius:5px;font-size:.65rem;font-weight:700;vertical-align:middle;flex-shrink:0}
.accordion-content{display:grid;grid-template-rows:0fr;transition:grid-template-rows .4s ease,padding .4s ease,border-color .4s ease;padding:0 16px;border-top:1px solid transparent;background:#FFFBF7}
.accordion-content.active{grid-template-rows:1fr;padding:0 16px 16px;border-top-color:#E8DDD0}
.accordion-inner{overflow:hidden;min-height:0}
.accordion-content p{margin:12px 0 0;font-size:.875rem;line-height:1.6;color:#6B5D4F}
.manual-image{width:100%;max-width:100%;aspect-ratio:1/1;height:auto;object-fit:contain;border-radius:8px;display:block;border:1px solid #E8DDD0;background:#FAF5EF}
.manual-image-wrap{position:relative;margin-top:12px}
.manual-image-wrap .manual-image{margin-top:0}
.zoom-hint{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:8px;padding:10px 16px;background:rgba(92,74,58,.82);color:#FFFBF7;border-radius:12px;font-size:.75rem;font-weight:600;line-height:1.3;text-align:center;pointer-events:none;opacity:0;transition:opacity .4s ease;z-index:2;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.zoom-hint.show{opacity:1}
.expand-arrows{display:flex;align-items:center;justify-content:space-between;width:36px;animation:expandArrows 2s ease-in-out infinite}
.expand-arrows .arrow{width:8px;height:8px;border-top:2px solid #FFFBF7;border-right:2px solid #FFFBF7;flex-shrink:0}
.expand-arrows .arrow-left{transform:rotate(-135deg)}
.expand-arrows .arrow-right{transform:rotate(45deg)}
@keyframes expandArrows{0%,100%{width:32px}50%{width:72px}}
.app-logo{display:block;width:100px;height:auto;margin:14px auto 0;border-radius:18px}
.action-button{margin-top:14px;padding:12px 20px;border:none;border-radius:8px;background:#B8864B;color:#FFFBF7;font-size:.875rem;font-weight:600;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;display:block;text-align:center;text-decoration:none}
.action-button:active{background:#9A7340}
.download-buttons{display:flex;flex-direction:row;gap:8px;margin-top:14px}
.download-buttons .action-button{margin-top:0;flex:1}
.kakao-channel-wrap{margin-top:24px;padding-top:8px}
.kakao-channel-text{margin:0 0 10px;font-size:.875rem;font-weight:600;text-align:center;color:#5C4A3A;line-height:1.4}
.kakao-channel-button{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border:none;border-radius:8px;background:#FEE500;color:#3C1E1E;font-size:.9rem;font-weight:700;text-decoration:none;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 6px rgba(92,74,58,.12)}
.kakao-channel-button:active{background:#F5DC00}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#5C4A3A;color:#FAF5EF;padding:12px 24px;border-radius:8px;display:none;font-size:.875rem;z-index:100;white-space:nowrap}
</style>

<script>
const buttonSound = document.getElementById('button-sound');

let lastButtonSoundAt = 0;

function playButtonSound() {
  const now = Date.now();
  if (now - lastButtonSoundAt < 250) return;
  lastButtonSoundAt = now;

  buttonSound.pause();
  buttonSound.currentTime = 0;
  buttonSound.play().catch(() => {});
}

document.addEventListener('click', (e) => {
  if (e.target.closest('button, a.action-button')) playButtonSound();
}, { capture: true });

// 앱 다운로드 링크 — URL 입력 시 각 버튼에 연동됩니다
const IOS_DOWNLOAD_URL = 'https://apps.apple.com/kr/app/%EC%8A%A4%ED%91%BC%EC%9E%89%EA%B8%80%EB%A6%AC%EC%89%AC/id6755587378';
const ANDROID_DOWNLOAD_URL = 'https://play.google.com/store/apps/details?id=com.tutee.spoon';

function setupDownloadLink(id, url) {
  const link = document.getElementById(id);
  if (url) {
    link.href = url;
    link.target = '_blank';
    link.rel = 'noopener noreferrer';
  } else {
    link.onclick = (e) => {
      e.preventDefault();
      showToast('다운로드 링크 준비 중입니다');
    };
  }
}
setupDownloadLink('ios-download-link', IOS_DOWNLOAD_URL);
setupDownloadLink('android-download-link', ANDROID_DOWNLOAD_URL);

document.querySelectorAll('.accordion-content').forEach(content => {
  const inner = document.createElement('div');
  inner.className = 'accordion-inner';
  while (content.firstChild) inner.appendChild(content.firstChild);
  content.appendChild(inner);
});

document.querySelectorAll('.manual-image').forEach(img => {
  const wrap = document.createElement('div');
  wrap.className = 'manual-image-wrap';
  img.parentNode.insertBefore(wrap, img);
  wrap.appendChild(img);
  const hint = document.createElement('div');
  hint.className = 'zoom-hint';
  hint.innerHTML = '<div class="expand-arrows"><span class="arrow arrow-left"></span><span class="arrow arrow-right"></span></div><span>확대해 보세요</span>';
  wrap.appendChild(hint);
});

function updateZoomHints(activeContent) {
  document.querySelectorAll('.zoom-hint').forEach(h => {
    h.classList.remove('show');
    clearTimeout(h._hideTimer);
  });
  if (!activeContent) return;
  const hint = activeContent.querySelector('.zoom-hint');
  if (!hint) return;
  hint.classList.add('show');
  hint._hideTimer = setTimeout(() => hint.classList.remove('show'), 2000);
}

document.querySelectorAll('.accordion-header').forEach(h => {
  h.onclick = () => {
    const item = h.parentElement;
    const content = h.nextElementSibling;
    const isOpen = content.classList.contains('active');
    document.querySelectorAll('.accordion-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.accordion-item').forEach(i => i.classList.remove('open'));
    if (!isOpen) {
      content.classList.add('active');
      item.classList.add('open');
      setTimeout(() => updateZoomHints(content), 400);
    } else {
      updateZoomHints(null);
    }
  };
});
function showToast(msg) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}
</script>
